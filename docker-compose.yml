services:
  mysql:
    image: mysql:8.0
    container_name: fbcrunning-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fbcrunning
      MYSQL_USER: fbcrunning
      MYSQL_PASSWORD: fbcrunning
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - fbcrunning-net

  backend:
    image: fbcrunning-backend:latest
    container_name: fbcrunning-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/fbcrunning?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: fbcrunning
      SPRING_DATASOURCE_PASSWORD: fbcrunning
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - fbcrunning-net

volumes:
  mysql_data:

networks:
  fbcrunning-net:
    driver: bridge